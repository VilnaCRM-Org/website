config_version = "0"

exclude_patterns = [
  "*_min.*",
  "*-min.*",
  "*.min.*",
  "**/.yarn/**",
  "**/*.d.ts",
  "**/assets/**",
  "**/bower_components/**",
  "**/build/**",
  "**/cache/**",
  "**/config/**",
  "**/db/**",
  "**/deps/**",
  "**/dist/**",
  "**/extern/**",
  "**/external/**",
  "**/generated/**",
  "**/Godeps/**",
  "**/gradlew/**",
  "**/mvnw/**",
  "**/node_modules/**",
  "**/protos/**",
  "**/seed/**",
  "**/specs/**",
  "**/target/**",
  "**/templates/**",
  "**/testdata/**",
  "**/vendor/**",
  # YAML is formatted by yamlfmt and .github by yamlfmt/actionlint; CHANGELOG.md
  # is auto-generated. Exclude them so qlty does not double-format files owned by
  # other tooling (avoids conflicts with the yamlfmt check).
  "*.yml",
  "*.yaml",
  "**/*.yml",
  "**/*.yaml",
  ".github/**",
  "CHANGELOG.md",
  # Infra files with intentional non-standard patterns, outside the repo's eslint
  # scope: an ES5.1 CloudFront function (uses `var` by design) and a server
  # bootstrap that configures dotenv before its other imports load.
  "scripts/cloudfront_routing.js",
  "docker/apollo-server/server.mts",
  # Root config files not under any eslint config block (they live at the repo
  # root, outside src/), so qlty's eslint only emits a "file ignored" warning.
  # They are Prettier-formatted via `make format`.
  ".dependency-cruiser.js",
  "jest.config.ts",
]

test_patterns = [
  "**/test/**",
  "**/spec/**",
  "**/*.test.*",
  "**/*.spec.*",
  "**/*_test.*",
  "**/*_spec.*",
  "**/test_*.*",
  "**/spec_*.*",
]

[smells]
mode = "comment"

[[source]]
name = "default"
default = true


[[plugin]]
name = "actionlint"

[[plugin]]
name = "editorconfig-checker"
mode = "comment"

[[plugin]]
name = "eslint"
package_file = "package.json"
package_filters = ["eslint", "jest", "prettier"]

[[plugin]]
name = "hadolint"

[[plugin]]
name = "osv-scanner"

[[plugin]]
name = "prettier"
package_file = "package.json"
package_filters = ["prettier"]

[[plugin]]
name = "radarlint-iac"
mode = "monitor"

[[plugin]]
name = "ripgrep"
mode = "comment"

[[plugin]]
name = "shellcheck"

[[plugin]]
name = "trufflehog"

[[plugin]]
name = "zizmor"
