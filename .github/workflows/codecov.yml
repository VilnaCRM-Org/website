name: codecov

on:
  pull_request:
    branches:
      - main

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  codecov:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: '.nvmrc'

      - name: Cache pnpm store
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('.nvmrc') }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-${{ hashFiles('.nvmrc') }}-

      - name: Setup pnpm and install dependencies
        run: |
          # Install the exact pnpm pinned in package.json's packageManager field.
          # Corepack is avoided: the .nvmrc-pinned Node (22.12.0) ships a corepack
          # whose signing keys can't verify the registry ("Cannot find matching
          # keyid"). Mirrors static-testing.yml and dependency-cruiser.yml.
          npm install -g "$(node -p "require('./package.json').packageManager.split('+')[0]")"
          pnpm config set store-dir ~/.pnpm-store
          pnpm install --frozen-lockfile

      - name: Run unit tests
        run: make test-unit-all

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
