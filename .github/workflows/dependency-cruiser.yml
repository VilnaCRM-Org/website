name: dependency cruiser
on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  dependency-cruiser:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          # dependency-cruiser supports LTS Node only (^20.12 || ^22 || >=24);
          # pin to the repo's .nvmrc (22.x) rather than non-LTS vars.NODE_VERSION.
          node-version-file: '.nvmrc'

      - name: Cache pnpm dependencies
        id: cache-pnpm-dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: node_modules
          key: ${{ runner.os }}-dependencies-${{ hashFiles('.nvmrc') }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-dependencies-

      - name: Install pnpm
        # Install the exact pnpm pinned in package.json's packageManager field,
        # keeping a single source of truth. Corepack is avoided here: the
        # .nvmrc-pinned Node (22.12.0) ships a corepack whose signing keys can't
        # verify the registry, failing provisioning ("Cannot find matching keyid").
        run: npm install -g "$(node -p "require('./package.json').packageManager.split('+')[0]")"

      - name: Install dependencies
        run: make install
        if: steps.cache-pnpm-dependencies.outputs.cache-hit != 'true'

      - name: Validate architecture boundaries
        run: make lint-deps CI=1
