name: performance testing
on: [push]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 19.0.1

      - run: npm install -g pnpm
      - run: pnpm i --frozen-lockfile
      - run: pnpm run lighthouse:check
