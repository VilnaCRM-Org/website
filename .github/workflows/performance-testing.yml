name: performance testing

on:
  pull_request:
    branches:
      - main

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  performance:
    # Desktop and mobile Lighthouse used to run back-to-back in one job, each
    # booting and building the app; they are now independent matrix cells that
    # run in parallel, cutting the job's wall-clock roughly in half.
    name: lighthouse ${{ matrix.formFactor }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        formFactor: [desktop, mobile]

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'

      - name: Cache Bun cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('.nvmrc') }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ hashFiles('.nvmrc') }}-

      - name: Setup Bun and install dependencies
        run: |
          # Install the exact Bun pinned in package.json's packageManager field,
          # so the version is declared in exactly one place. Corepack does not
          # manage Bun, so it is installed globally via `npm install -g`.
          npm install -g "$(node -p "require('./package.json').packageManager.split('+')[0]")"
          bun install --frozen-lockfile

      - name: Run ${{ matrix.formFactor }} performance test
        env:
          FORM_FACTOR: ${{ matrix.formFactor }}
        run: make "lighthouse-$FORM_FACTOR"

      # Publish the raw Lighthouse reports so the measured scores and metric
      # values behind the pass/fail decision are inspectable, and so floors can
      # be ratcheted from real CI baselines rather than guesses. Always runs,
      # even when an assertion fails, to capture the regression that tripped it.
      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: lighthouse-reports-${{ matrix.formFactor }}
          path: |
            lhci-reports-${{ matrix.formFactor }}
            .lighthouseci
          retention-days: 7
          if-no-files-found: ignore
