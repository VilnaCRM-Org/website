name: secrets scanning

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Scan working tree for secrets
        run: |
          # Scan the checked-out files (not git history) against the committed
          # .gitleaks.toml allowlist. Deterministic and license-free: the
          # gitleaks GitHub Action requires a paid license for organizations,
          # so the CLI image is run directly, pinned by digest (v8.30.1).
          docker run --rm -v "$GITHUB_WORKSPACE:/repo" -w /repo \
            ghcr.io/gitleaks/gitleaks@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f \
            detect --source /repo --no-git --config /repo/.gitleaks.toml --redact --exit-code 1
