name: rust code analysis
on:
  pull_request:
    branches:
      - main

permissions: {}

concurrency:
  group: rca-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-code-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      CI: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install rust-code-analysis CLI
        # Pinned + SHA256-verified prebuilt asset -> ./bin (same path as local).
        # No Node/Bun/`make install`: the analyzer reads the source tree directly.
        env:
          RCA_VERSION: '0.0.25'
        run: sh scripts/ci/ensure-rca.sh

      - name: Run code metrics gate
        run: make lint-metrics CI=1
