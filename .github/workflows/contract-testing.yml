name: contract testing

on:
  pull_request:
    branches:
      - main

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      CI: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'

      - name: Cache Bun cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('.nvmrc') }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ hashFiles('.nvmrc') }}-

      - name: Setup Bun and install dependencies
        run: |
          # Install the exact Bun pinned in package.json's packageManager field,
          # so the version is declared in exactly one place. Corepack does not
          # manage Bun, so it is installed globally via `npm install -g`.
          npm install -g "$(node -p "require('./package.json').packageManager.split('+')[0]")"
          bun install --frozen-lockfile

      # This is the one job allowed to reach raw.githubusercontent.com: it
      # re-fetches the tag in USER_SERVICE_VERSION and fails if the committed
      # artifacts under contracts/ have drifted from it. Everything else — the
      # docker build, the swagger page, the Apollo mock — reads the committed
      # copies, so an upstream outage cannot break an unrelated build.
      - name: Validate user-service contracts
        run: make lint-contracts
