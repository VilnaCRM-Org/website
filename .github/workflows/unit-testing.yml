name: unit testing

on:
  pull_request:
    branches:
      - main

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'

      - name: Cache pnpm store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('.nvmrc') }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-${{ hashFiles('.nvmrc') }}-

      - name: Setup pnpm and install dependencies
        run: |
          # Install the exact pnpm pinned in package.json's packageManager field,
          # so the version is declared in exactly one place. Corepack is avoided
          # because `npm install -g` carries the registry signing keys that the
          # pinned Node's bundled corepack lacks.
          npm install -g "$(node -p "require('./package.json').packageManager.split('+')[0]")"
          pnpm config set store-dir ~/.pnpm-store
          pnpm install --frozen-lockfile

      - name: Run unit tests
        run: make test-unit-all
