name: security testing

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    # Weekly re-scan of main with the latest CodeQL query packs.
    - cron: '0 5 * * 1'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['typescript']

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Cache CodeQL databases
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ github.workspace }}/codeql_databases
          key: ${{ runner.os }}-codeql-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-codeql-

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v3
        with:
          languages: ${{ matrix.language }}
          # Pin the database directory to the cached path; the action otherwise
          # defaults to a temp dir the cache step would never hit.
          db-location: ${{ github.workspace }}/codeql_databases

      - name: Autobuild
        uses: github/codeql-action/autobuild@7188fc363630916deb702c7fdcf4e481b751f97a # v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v3
        with:
          category: '/language:${{matrix.language}}'
