name: static testing
on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  static:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'

      - name: Cache bun dependencies
        id: cache-bun-dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          # Node comes from .nvmrc here, so fold it into the key: a Node bump must
          # invalidate node_modules or a stale native module could be restored.
          path: node_modules
          key: ${{ runner.os }}-dependencies-${{ hashFiles('.nvmrc') }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-dependencies-

      - name: Install Bun
        # Install the exact Bun pinned in package.json's packageManager field
        # (not the latest global) so the version is declared in exactly one place
        # and lockfile resolution matches every other job. Corepack does not
        # manage Bun, so it is installed globally via `npm install -g`.
        run: npm install -g "$(node -p "require('./package.json').packageManager.split('+')[0]")"

      - name: Install dependencies
        run: make install
        if: steps.cache-bun-dependencies.outputs.cache-hit != 'true'

      - name: Run all linters
        run: make lint
