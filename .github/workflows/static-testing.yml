name: static testing
on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  static:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: '.nvmrc'

      - name: Cache pnpm dependencies
        id: cache-pnpm-dependencies
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          # Node comes from .nvmrc here, so fold it into the key: a Node bump must
          # invalidate node_modules or a stale native module could be restored.
          path: node_modules
          key: ${{ runner.os }}-dependencies-${{ hashFiles('.nvmrc') }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-dependencies-

      - name: Install pnpm
        # Install the exact pnpm pinned in package.json's packageManager field
        # (not the latest global) so the version is declared in exactly one place
        # and lockfile resolution matches every other job. Corepack is avoided
        # because `npm install -g` carries the registry signing keys that the
        # pinned Node's bundled corepack lacks.
        run: npm install -g "$(node -p "require('./package.json').packageManager.split('+')[0]")"

      - name: Install dependencies
        run: make install
        if: steps.cache-pnpm-dependencies.outputs.cache-hit != 'true'

      - name: Run all linters
        run: make lint
