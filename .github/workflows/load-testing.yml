name: load testing
on: [push]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '14'

      - run: npm install -g pnpm
      - run: pnpm i --frozen-lockfile
      - run: pnpm add artillery
      - run: artillery dino

      # need add load tests when web page will be available
