name: load testing

on:
  pull_request:
    branches:
      - main

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  load-testing:
    # Each K6 scenario is an independent matrix cell (its own runner), so the
    # homepage and Swagger suites run in parallel instead of one after another.
    name: ${{ matrix.label }} load testing
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - make_cmd: test-load
            label: homepage
          - make_cmd: test-load-swagger
            label: swagger

    steps:
      - name: Checkout Repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ vars.NODE_VERSION }}

      - name: Run ${{ matrix.label }} target
        env:
          MAKE_CMD: ${{ matrix.make_cmd }}
        run: make "$MAKE_CMD"
